document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y:inherit;font-size:15px;font-weight:600;color:rgba(255,255,255,0.9);cursor:pointer;padding:16px 20px;border-radius:16px;border:1px solid rgba(255,255,255,0.12);background:linear-gradient(160deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));backdrop-filter:blur(16px);box-shadow:0 16px 40px -26px rgba(0,6,26,0.85),inset 0 1px 0 rgba(255,255,255,0.08);transition:transform .3s,border-color .3s;\" style-hover=\"transform:translateY(-2px);border-color:rgba(150,185,255,0.35);\">\n        Wat valt onder welk werk?\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <button onclick=\"{{ scrollSymp }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;font-family:inherit;font-size:15px;font-weight:600;color:rgba(255,255,255,0.9);cursor:pointer;padding:16px 20px;border-radius:16px;border:1px solid rgba(255,255,255,0.12);background:linear-gradient(160deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));backdrop-filter:blur(16px);box-shadow:0 16px 40px -26px rgba(0,6,26,0.85),inset 0 1px 0 rgba(255,255,255,0.08);transition:transform .3s,border-color .3s;\" style-hover=\"transform:translateY(-2px);border-color:rgba(150,185,255,0.35);\">\n        Symptomenkaart\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <button onclick=\"{{ scrollInterv }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;font-family:inherit;font-size:15px;font-weight:600;color:rgba(255,255,255,0.9);cursor:pointer;padding:16px 20px;border-radius:16px;border:1px solid rgba(255,255,255,0.12);background:linear-gradient(160deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));backdrop-filter:blur(16px);box-shadow:0 16px 40px -26px rgba(0,6,26,0.85),inset 0 1px 0 rgba(255,255,255,0.08);transition:transform .3s,border-color .3s;\" style-hover=\"transform:translateY(-2px);border-color:rgba(150,185,255,0.35);\">\n        Instructies interventie\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div id=\"werk\" style=\"background:linear-gradient(160deg,rgba(255,255,255,0.07),rgba(255,255,255,0.028));backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);border:1px solid rgba(255,255,255,0.11);border-radius:22px;box-shadow:0 28px 70px -34px rgba(0,6,26,0.9),inset 0 1px 0 rgba(255,255,255,0.09);padding:28px 30px;margin-bottom:20px;animation:fadeUp .6s both;\">\n      <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:22px;\">\n        <div style=\"flex:none;width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,rgba(255,255,255,0.12),rgba(255,255,255,0.03));border:1px solid rgba(255,255,255,0.14);color:rgba(185,210,255,0.95);box-shadow:inset 0 1px 0 rgba(255,255,255,0.16);\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76Z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <p style=\"font-size:19px;font-weight:600;color:#fff;margin:0;\">Wat valt onder welk type werk?<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;\">\n        <div style=\"padding:16px 18px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(52,211,153,0.24);position:relative;\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px;\"><span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:#34d399;box-shadow:0 0 10px 0 rgba(52,211,153,0.75);\"><\u002Fspan><p style=\"font-size:14.5px;font-weight:700;color:#fff;margin:0;\">Lichte fysieke arbeid<\u002Fp><\u002Fdiv>\n          <p style=\"font-size:12px;color:rgba(255,255,255,0.45);margin:0 0 8px;font-weight:500;letter-spacing:0.02em;\">Actiewaarde WBGT 29<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.62);margin:0;font-weight:400;\">Administratieve taken, meldkamer bezetten, verslaggeving, opleidingen in leslokaal, besturen van een voertuig zonder fysieke inzet.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:16px 18px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(251,191,36,0.24);position:relative;\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px;\"><span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:#fbbf24;box-shadow:0 0 10px 0 rgba(251,191,36,0.75);\"><\u002Fspan><p style=\"font-size:14.5px;font-weight:700;color:#fff;margin:0;\">Middelmatig zware arbeid<\u002Fp><\u002Fdiv>\n          <p style=\"font-size:12px;color:rgba(255,255,255,0.45);margin:0 0 8px;font-weight:500;letter-spacing:0.02em;\">Actiewaarde WBGT 26<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.62);margin:0;font-weight:400;\">Patiëntenzorg door de ambulanceploeg, opbouw van signalisatie, gebruik van lichte technische hulpmiddelen, logistieke taken op incidenten.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:16px 18px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,140,58,0.24);position:relative;\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px;\"><span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:#ff8c3a;box-shadow:0 0 10px 0 rgba(255,140,58,0.75);\"><\u002Fspan><p style=\"font-size:14.5px;font-weight:700;color:#fff;margin:0;\">Zware fysieke arbeid<\u002Fp><\u002Fdiv>\n          <p style=\"font-size:12px;color:rgba(255,255,255,0.45);margin:0 0 8px;font-weight:500;letter-spacing:0.02em;\">Actiewaarde WBGT 22<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.62);margin:0;font-weight:400;\">Technische hulpverlening, werken met hydraulisch reddingsgereedschap, slangen uitrollen, langdurige bluswerkzaamheden, evacuatie van slachtoffers.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:16px 18px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,90,110,0.28);position:relative;\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px;\"><span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:#ff5a6e;box-shadow:0 0 10px 0 rgba(255,90,110,0.8);\"><\u002Fspan><p style=\"font-size:14.5px;font-weight:700;color:#fff;margin:0;\">Zeer zware fysieke arbeid<\u002Fp><\u002Fdiv>\n          <p style=\"font-size:12px;color:rgba(255,255,255,0.45);margin:0 0 8px;font-weight:500;letter-spacing:0.02em;\">Actiewaarde WBGT 18<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.62);margin:0;font-weight:400;\">Binnenaanval met ademlucht, redding van slachtoffers via ladders of trappen, zwaar sloop- en breekwerk.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:13px;color:rgba(255,255,255,0.45);margin:16px 0 0;line-height:1.5;font-weight:400;\">Het gaat om de fysieke arbeidsbelasting, niet om hoe zwaar een taak mentaal weegt. Een interventie met ademlucht en volledige interventiekledij valt onder zeer zwaar werk.<\u002Fp>\n    <\u002Fdiv>\n\n    <div id=\"symp\" style=\"background:linear-gradient(160deg,rgba(255,255,255,0.07),rgba(255,255,255,0.028));backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);border:1px solid rgba(255,255,255,0.11);border-radius:22px;box-shadow:0 28px 70px -34px rgba(0,6,26,0.9),inset 0 1px 0 rgba(255,255,255,0.09);padding:28px 30px;margin-bottom:20px;animation:fadeUp .6s both;\">\n      <div style=\"display:flex;align-items:center;gap:13px;\">\n        <div style=\"flex:none;width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,rgba(255,255,255,0.12),rgba(255,255,255,0.03));border:1px solid rgba(255,255,255,0.14);color:rgba(185,210,255,0.95);box-shadow:inset 0 1px 0 rgba(255,255,255,0.16);\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20.8 8.6a5.5 5.5 0 0 0-9.8-2 5.5 5.5 0 0 0-9.8 2c0 5.4 9.8 11 9.8 11s9.8-5.6 9.8-11Z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <p style=\"font-size:19px;font-weight:600;color:#fff;margin:0;\">Symptomen thermische overbelasting &amp; acties<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-top:22px;\">\n        <div style=\"position:relative;padding:20px 18px 18px;border-radius:16px;background:rgba(255,255,255,0.045);border:1px solid rgba(251,191,36,0.24);\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin:0 0 8px;\"><span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:#fbbf24;box-shadow:0 0 10px 0 rgba(251,191,36,0.75);\"><\u002Fspan><p style=\"font-size:15px;font-weight:700;color:#fff;margin:0;\">Hittespierkrampen<\u002Fp><\u002Fdiv>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.6);margin:0 0 10px;font-weight:400;\">Spierkrampen in buik, armen en benen na overvloedig zweten bij zware inspanning.<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.92);margin:0;font-weight:500;\">→ Rust in koele omgeving.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative;padding:20px 18px 18px;border-radius:16px;background:rgba(255,255,255,0.045);border:1px solid rgba(255,140,58,0.24);\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin:0 0 8px;\"><span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:#ff8c3a;box-shadow:0 0 10px 0 rgba(255,140,58,0.75);\"><\u002Fspan><p style=\"font-size:15px;font-weight:700;color:#fff;margin:0;\">Hitte-uitputting<\u002Fp><\u002Fdiv>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.6);margin:0 0 10px;font-weight:400;\">Dorst, duizeligheid, flauwte, vermoeidheid, onrustige nachten, misselijkheid.<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.92);margin:0;font-weight:500;\">→ Koele plaats, uitkleden, afkoelen, isotoon drinken, liggend rusten.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative;padding:20px 18px 18px;border-radius:16px;background:rgba(255,255,255,0.045);border:1px solid rgba(255,140,58,0.24);\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin:0 0 8px;\"><span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:#ff8c3a;box-shadow:0 0 10px 0 rgba(255,140,58,0.75);\"><\u002Fspan><p style=\"font-size:15px;font-weight:700;color:#fff;margin:0;\">Zonneslag<\u002Fp><\u002Fdiv>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.6);margin:0 0 10px;font-weight:400;\">Rood aangezicht, droge huid, snelle hartslag, hoofdpijn, duizeligheid, braakneiging.<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.92);margin:0;font-weight:500;\">→ Koele plaats, afkoelen, isotoon drinken.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"position:relative;padding:20px 18px 18px;border-radius:16px;background:rgba(217,0,27,0.09);border:1px solid rgba(255,59,78,0.32);box-shadow:0 0 30px -14px rgba(217,0,27,0.5);\">\n          <div style=\"display:flex;align-items:center;gap:9px;margin:0 0 8px;flex-wrap:wrap;\"><span style=\"flex:none;width:9px;height:9px;border-radius:50%;background:#ff3b4e;box-shadow:0 0 10px 0 rgba(255,59,78,0.8);\"><\u002Fspan><p style=\"font-size:15px;font-weight:700;color:#fff;margin:0;\">Hitteslag<\u002Fp><span style=\"font-size:11.5px;font-weight:700;letter-spacing:0.04em;padding:3px 10px;border-radius:999px;background:#D9001B;color:#fff;box-shadow:0 4px 14px -3px rgba(217,0,27,0.7);\">BEL 112<\u002Fspan><\u002Fdiv>\n          <p style=\"font-size:13px;line-height:1.5;color:rgba(255,255,255,0.62);margin:0 0 10px;font-weight:400;\">Niet meer zweten, rode huid, verwardheid, spierkrampen, plotse temperatuurstijging, stuipen.<\u002Fp>\n          <p style=\"font-size:13px;line-height:1.5;color:#fff;margin:0;font-weight:500;\">→ Levensbedreigend: 112, koele plaats, afkoelen, vitale parameters.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:13px;color:rgba(255,255,255,0.5);margin:16px 0 0;line-height:1.5;font-weight:400;\">Herken je een van deze vormen? Geef dit onmiddellijk door aan de bevelvoerder van de interventie.<\u002Fp>\n    <\u002Fdiv>\n\n    <div id=\"interv\" style=\"background:linear-gradient(160deg,rgba(255,255,255,0.07),rgba(255,255,255,0.028));backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%);border:1px solid rgba(255,255,255,0.11);border-radius:22px;box-shadow:0 28px 70px -34px rgba(0,6,26,0.9),inset 0 1px 0 rgba(255,255,255,0.09);padding:28px 30px;margin-bottom:28px;animation:fadeUp .6s both;\">\n      <div style=\"display:flex;align-items:center;gap:13px;\">\n        <div style=\"flex:none;width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,rgba(255,255,255,0.12),rgba(255,255,255,0.03));border:1px solid rgba(255,255,255,0.14);color:rgba(185,210,255,0.95);box-shadow:inset 0 1px 0 rgba(255,255,255,0.16);\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2.7 6.3 8.5a8 8 0 1 0 11.3 0Z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <p style=\"font-size:19px;font-weight:600;color:#fff;margin:0;\">Instructies bij interventie in warm weer<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:28px;margin-top:22px;\">\n        <div>\n          <p style=\"font-size:12.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(150,185,255,0.85);margin:0 0 6px;\">Vóór<\u002Fp>\n          <p style=\"font-size:13.5px;line-height:1.6;color:rgba(255,255,255,0.6);margin:0 0 16px;font-weight:400;\">Vul je drinkfles met vers water - eet evenwichtig voor de zoutbalans - drink ~0,5 l/u tijdens rust (geen alcohol/cafeïne) - zorg dat je huid schoon en droog is - pas oefeningen aan het weer aan.<\u002Fp>\n          <p style=\"font-size:12.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(150,185,255,0.85);margin:0 0 6px;\">Tijdens<\u002Fp>\n          <p style=\"font-size:13.5px;line-height:1.6;color:rgba(255,255,255,0.6);margin:0 0 14px;font-weight:400;\">Schaal snel op - los af na één ademluchtfles - zwaar werk samen - blijf uit de hittebron en in de schaduw - drink 0,75-1 l/u (niet meer) - vermijd onnodige inspanning.<\u002Fp>\n          <div style=\"display:flex;gap:11px;padding:13px 15px;border-radius:13px;background:rgba(217,0,27,0.10);border:1px solid rgba(217,0,27,0.35);\">\n            <span style=\"color:#FF5A6E;flex:none;margin-top:1px;\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z\"><\u002Fpath><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n            <p style=\"font-size:13px;line-height:1.5;color:#FFB3BC;margin:0;font-weight:500;\">Rehab-wagen nodig? De LVO roept deze op via de meldkamer, na contact met de Dir BW.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <p style=\"font-size:12.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(150,185,255,0.85);margin:0 0 6px;\">Direct na<\u002Fp>\n          <p style=\"font-size:13.5px;line-height:1.6;color:rgba(255,255,255,0.6);margin:0 0 12px;font-weight:400;\">Trek in een veilige omgeving je PBM uit (vermijd contact met gevaarlijke stoffen) - blijf in koele/schaduwrijke omgeving - drink water + isotoon - koel handen en/of voeten - meld het als je je niet goed voelt.<\u002Fp>\n          <p style=\"font-size:14px;font-weight:600;color:#fff;margin:0 0 16px;\">Herstel = 3× de duur van de interventie.<\u002Fp>\n          <p style=\"font-size:12.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(150,185,255,0.85);margin:0 0 6px;\">Algemeen<\u002Fp>\n          <p style=\"font-size:13.5px;line-height:1.6;color:rgba(255,255,255,0.6);margin:0;font-weight:400;\">Zorg voor goede gezondheid en fitheid - ken de tekenen van thermische overbelasting bij jezelf én collega's - controleer je interventiepak bij aanvang en na elke interventie.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <a href=\"https://www.meteo.be/nl/weer/waarschuwingen/hitte\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;align-items:center;gap:16px;text-decoration:none;padding:20px 24px;border-radius:20px;background:linear-gradient(150deg,rgba(217,0,27,0.16),rgba(217,0,27,0.06));border:1px solid rgba(217,0,27,0.4);box-shadow:0 22px 54px -28px rgba(217,0,27,0.6),0 0 44px -20px rgba(217,0,27,0.45),inset 0 1px 0 rgba(255,255,255,0.08);backdrop-filter:blur(18px);margin-bottom:30px;transition:transform .3s,box-shadow .3s;\" style-hover=\"transform:translateY(-2px);box-shadow:0 28px 62px -28px rgba(217,0,27,0.78),0 0 54px -18px rgba(217,0,27,0.55);\">\n      <div style=\"flex:none;width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(217,0,27,0.9);color:#fff;box-shadow:0 8px 22px -6px rgba(217,0,27,0.85);\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z\"><\u002Fpath><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:16px;font-weight:700;color:#fff;margin:0 0 3px;\">Officiële KMI-waarschuwingen &amp; nationaal Warmteactieplan<\u002Fp>\n        <p style=\"font-size:13.5px;line-height:1.5;color:rgba(255,255,255,0.64);margin:0;font-weight:400;\">Code geel/oranje/rood en de waarschuwingsfase zijn menselijke beoordelingen. Controleer rechtstreeks bij het KMI. →<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fa>\n\n    <p style=\"font-size:12.5px;line-height:1.75;color:rgba(255,255,255,0.4);margin:0;font-weight:400;\">\n      <strong style=\"color:rgba(255,255,255,0.6);font-weight:600;\">Belangrijk:<\u002Fstrong> de WBGT-waarde is <strong style=\"color:rgba(255,255,255,0.6);font-weight:600;\">berekend<\u002Fstrong>, niet gemeten. De berekening gebruikt de officiële tabelmethode (Charbonneau) op basis van temperatuur, luchtvochtigheid en windsnelheid, zoals aanvaard door de FOD WASO. Ze houdt geen rekening met directe zonnestraling - we werken niet noodzakelijk in volle zon en creëren schaduw waar mogelijk (zie de veiligheidsinstructies). De tool gebruikt de tabel met luchtstroming bij wind en zonder luchtstroming bij windstil weer. Kleurcode volgens de actiewaarden en werkregimes uit Codex boek&nbsp;V, titel&nbsp;1 en de veiligheidsinstructies van de zone: groen (onder actiewaarde, algemene maatregelen), geel (actiewaarde bereikt, gele maatregelen, nog geen pauze), oranje (45' werk / 15' pauze) en rood (30' werk / 30' pauze). Oranje en rood delen dezelfde maatregelen, enkel het werkregime verschilt. Werktype-voorbeelden en logica gebaseerd op de WBGT-toepassing van de preventieadviseur. Ozon in µg/m³: informatiedrempel 180 (wees bewust van het risico), alarmdrempel 240 (neem maatregelen). De ozon-indicatie verschijnt enkel bij overschrijding van 180. Databronnen: Open-Meteo (weer, o.a. modellen van KNMI en Météo-France) en CAMS European air quality forecast via Open-Meteo (ozon), CC BY 4.0.\n    <\u002Fp>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;atmosphere&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:100,&quot;min&quot;:0,&quot;max&quot;:150,&quot;step&quot;:5,&quot;unit&quot;:&quot;%&quot;,&quot;section&quot;:&quot;Sfeer&quot;,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = { store:{}, loading:true, prof:'oper', loadKey:'zw', kazIdx:0, updated:'', query:'', searchCard:null, searchMsg:'', searchErr:false };\n\n  KAZ = [\n    {n:\"Kazerne Aalst\",a:\"Vrijheidstraat 55, 9300 Aalst\",lat:50.9345,lon:4.0490},\n    {n:\"Zonehuis Aalst\",a:\"Keizersplein 44, 9300 Aalst\",lat:50.9375,lon:4.0395},\n    {n:\"Kazerne Moorsel\",a:\"Kortenbosdries, 9310 Aalst\",lat:50.9330,lon:4.0965},\n    {n:\"Kazerne Lede\",a:\"Vijverstraat 2A, 9340 Lede\",lat:50.9665,lon:3.9905},\n    {n:\"Ambulance Lede\",a:\"Reymeersstraat 13A, 9340 Lede\",lat:50.9720,lon:3.9840},\n    {n:\"Kazerne Haaltert\",a:\"Dreef 20, 9450 Haaltert\",lat:50.9035,lon:3.9985},\n    {n:\"Kazerne Denderleeuw\",a:\" old; return [{name:'Alle types', label:this.COLLABEL.cold, fg:c.fg, bg:c.bg, brd:c.brd, dot:c.dot, glow:c.glow}]; }\n    return this.WORDER.map(wid=>{ const wk=this.WORK[wid]; const col=this.colorFor(wb,wk); const c=this.COL[col];\n      return {name:wk.n, label:this.COLLABEL[col], fg:c.fg, bg:c.bg, brd:c.brd, dot:c.dot, glow:c.glow}; });\n  }\n  ozoneFor(oz){\n    if(oz==null)return null; const n=Math.round(oz);\n    if(oz>=this.OZ_ALARM) return {title:'Ozon-alarm - '+n+' µg/m³.', text:' Neem maatregelen: zwaar buitenwerk enkel in de voormiddag, lichtere taken, pauzes en werk binnen waar mogelijk. Let op gevoelige groepen (adem-/hartproblemen, zwangeren, ouderen).', bg:'rgba(255,90,110,0.16)', brd:'rgba(255,90,110,0.45)', dot:'#ff5a6e'};\n    if(oz>=this.OZ_INFO) return {title:'Ozon informeren - '+n+' µg/m³.', text:' Wees bewust van het risico bij zware inspanning in open lucht. Verplaats zwaar buitenwerk bij voorkeur naar de voormiddag.', bg:'rgba(255,140,58,0.16)', brd:'rgba(255,140,58,0.45)', dot:'#ff8c3a'};\n    return null;\n  }\n  cardFor(name,addr,d){\n    const c=d.w.current; const t=c.temperature_2m, rh=c.relative_humidity_2m, wind=c.wind_speed_10m;\n    const wb=this.wbgt(t,rh,wind); const oz=(d.a&&d.a.current)?d.a.current.ozone:null;\n    return {name, addr, state:'ok', isLoading:false, isNoData:false, isOk:true, temp:t.toFixed(1), vocht:Math.round(rh)+'', wind:(wind!=null?wind.toFixed(0):'-'), wbgt:wb.toFixed(1), rows:this.rowsFor(wb,t), ozone:this.ozoneFor(oz)};\n  }\n\n  sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }\n  async fetchJson(u,tries){ tries=tries||3; for(let i=0;i<tries;i++){ try{ const r=await fetch(u); if(r.ok)return r.json(); }catch(e){} await this.sleep(400*(i+1)); } return null; }\n  fetchWeather(lat,lon){ return this.fetchJson(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,apparent_temperature&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&forecast_days=7&timezone=Europe%2FBrussels`); }\n  fetchOzone(lat,lon){ return this.fetchJson(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=ozone&timezone=Europe%2FBrussels`); }\n\n  async loadAll(){\n    if(this._loading)return; this._loading=true; this.setState({loading:true});\n    const store={...this.state.store};\n    const BATCH=3;\n    for(let i=0;i<this.KAZ.length;i+=BATCH){\n      await Promise.all(this.KAZ.slice(i,i+BATCH).map(async k=>{ const w=await this.fetchWeather(k.lat,k.lon); const a=await this.fetchOzone(k.lat,k.lon); store[k.n]=w?{w,a}:null; }));\n      this.setState({store:{...store}});\n    }\n    this._loading=false;\n    this.setState({loading:false, updated:'Laatst vernieuwd: '+new Date().toLocaleString('nl-BE')});\n  }\n  async retryOne(name){ const k=this.KAZ.find(x=>x.n===name); if(!k)return; const w=await this.fetchWeather(k.lat,k.lon); const a=await this.fetchOzone(k.lat,k.lon); const store={...this.state.store}; store[name]=w?{w,a}:null; this.setState({store}); }\n\n  async doSearch(){\n    const q=(this.state.query||'').trim();\n    if(!q){ this.setState({searchCard:null, searchMsg:''}); return; }\n    this.setState({searchMsg:'Zoeken naar \"'+q+'\"…', searchErr:false, searchCard:null});\n    const geo=await this.fetchJson('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(q)+'&count=1&language=nl&countryCode=BE');\n    if(!geo||!geo.results||!geo.results.length){ this.setState({searchMsg:'Geen plaats gevonden voor \"'+q+'\". Probeer een gemeentenaam of postcode.', searchErr:true, searchCard:null}); return; }\n    const g=geo.results[0];\n    const w=await this.fetchWeather(g.latitude,g.longitude);\n    if(!w||!w.current){ this.setState({searchMsg:'Geen weerdata voor '+g.name+'.', searchErr:true, searchCard:null}); return; }\n    const a=await this.fetchOzone(g.latitude,g.longitude);\n    const place=g.name+(g.admin2?', '+g.admin2:'')+(g.postcodes&&g.postcodes.length?' ('+g.postcodes[0]+')':'');\n    const card=this.cardFor(place,'gevonden via zoekopdracht',{w,a});\n    this.setState({searchCard:card, searchMsg:'', searchErr:false});\n  }\n\n  dayMaxWbgt(d,di){ const H=d.w.hourly,s=di*24,e=s+24; let mx=-99; for(let i=s;i<e&&i<H.temperature_2m.length;i++){ const wnd=(H.wind_speed_10m&&H.wind_speed_10m[i]!=null)?H.wind_speed_10m[i]:0; const w=this.wbgt(H.temperature_2m[i],H.relative_humidity_2m[i],wnd); if(w>mx)mx=w; } return mx; }\n\n  scrollTo(id){ const el=document.getElementById(id); if(el){ const y=el.getBoundingClientRect().top+window.scrollY-16; window.scrollTo({top:y,behavior:'smooth'}); } }\n\n  renderVals(){\n    const KAZ=this.KAZ, WORK=this.WORK, PROFILES=this.PROFILES, COL=this.COL;\n    const prof=this.state.prof;\n    const wk=WORK[this.state.loadKey]||WORK.zw;\n    const atmOpacity=Math.max(0,Math.min(1.5,(this.props.atmosphere ?? 100)/100));\n\n    const stations=KAZ.map(k=>{\n      const retry=()=>this.retryOne(k.n);\n      const d=this.state.store[k.n];\n      if(d===undefined) return {name:k.n, addr:k.a, isLoading:true, isNoData:false, isOk:false, retry};\n      if(!d||!d.w) return {name:k.n, addr:k.a, isLoading:false, isNoData:true, isOk:false, retry};\n      const c=this.cardFor(k.n,k.a,d); c.retry=retry; return c;\n    });\n\n    const k=KAZ[this.state.kazIdx]; const d=this.state.store[k.n];\n    let panel;\n    if(!d||!d.w){ panel={noData:true, ok:false, kazName:k.n}; }\n    else {\n      const c=d.w.current; const t=c.temperature_2m, rh=c.relative_humidity_2m, wind=c.wind_speed_10m;\n      const wb=this.wbgt(t,rh,wind); const col=t<5?'cold':this.colorFor(wb,wk); const cc=COL[col];\n      let regimeValue, regimeDesc, maatr='';\n      if(col==='cold'){ regimeValue='Koude - let op'; regimeDesc='Let op de koudemaatregelen.'; }\n      else if(col==='groen'){ regimeValue='Algemene maatregelen'; regimeDesc='Onder de algemene actiewaarde - goede conditie, tijdig drinken, schoon interventiepak, symptomen herkennen.'; }\n      else if(col==='geel'){ regimeValue='Actiewaarde bereikt - nog geen pauze'; regimeDesc='De gele maatregelen zijn van toepassing.'; maatr='Vóór: voldoende vers drinkwater, evenwichtig eten, zonnecrème. Tijdens: schaduw opzoeken of tent plaatsen, minstens 0,5-1 l/u drinken, aflossen na max. 2 ademluchtflessen, samenwerken, REHAB-wagen en gekoelde container waar nodig. Na: koelen, isotoon drinken, herstel ≈ 3× de interventieduur.'; }\n      else if(col==='oranje'){ regimeValue='45 min werk / 15 min pauze'; regimeDesc='De gele maatregelen blijven onverminderd gelden.'; maatr='Bovenop geel: aflossen na één ademluchtfles; snel opschalen bij interventies > 30 min; REHAB-wagen en gekoelde container bij start; LVO duidt een veiligheidsman aan voor hitterisico\\'s; wespenverdelging pas vanaf 19u, max. 2u per ploeg.'; }\n      else { regimeValue='30 min werk / 30 min pauze'; regimeDesc='Dezelfde maatregelen als oranje, met dit strengere regime.'; maatr='Bovenop geel: aflossen na één ademluchtfles; snel opschalen bij interventies > 30 min; REHAB-wagen en gekoelde container bij start; LVO duidt een veiligheidsman aan voor hitterisico\\'s; wespenverdelging pas vanaf 19u, max. 2u per ploeg.'; }\n      panel={noData:false, ok:true, kazName:k.n, workName:wk.n, wbStr:wb.toFixed(1),\n        colLabel:this.COLLABEL[col], solidBg:cc.solidBg, solidFg:cc.solidFg, glow:cc.glow,\n        regimeValue, regimeDesc, maatr, showMeasures:!!maatr };\n    }\n\n    let forecast=[]; let fcTitle=k.n+' - '+wk.n+' werk';\n    if(d&&d.w){\n      d.w.daily.time.forEach((dt,i)=>{\n        const wbMax=this.dayMaxWbgt(d,i), tMax=d.w.daily.temperature_2m_max[i];\n        const col=this.colorFor(wbMax,wk); const cc=COL[col];\n        forecast.push({ day:new Date(dt).toLocaleDateString('nl-BE',{weekday:'short'}), temp:Math.round(tMax)+'', wbgt:wbMax.toFixed(0), col:cc.text, label:this.COLLABEL[col], border:cc.brd, glow:cc.glow });\n      });\n    }\n\n    const workOptions=PROFILES[prof].works.map(w=>({value:w,label:WORK[w].n+' werk'}));\n    const kazOptions=KAZ.map((kk,i)=>({value:i+'',label:kk.n}));\n\n    return {\n      updated: (this.state.loading&&!this.state.updated) ? 'Live data ophalen…' : this.state.updated,\n      spinStyle: this.state.loading? 'display:inline-flex;animation:spin 1s linear infinite;':'display:inline-flex;',\n      profValue: prof, loadKey:this.state.loadKey, kazIdxStr:this.state.kazIdx+'',\n      workOptions, kazOptions,\n      onProf:(e)=>{ const p=e.target.value; this.setState({prof:p, loadKey:PROFILES[p].def}); },\n      onLoad:(e)=>{ this.setState({loadKey:e.target.value}); },\n      onKaz:(e)=>{ this.setState({kazIdx:parseInt(e.target.value)}); },\n      refresh:()=>{ this.loadAll(); },\n      query:this.state.query,\n      onQuery:(e)=>{ this.setState({query:e.target.value}); },\n      onSearchKey:(e)=>{ if(e.key==='Enter'){ e.preventDefault(); this.doSearch(); } },\n      doSearch:()=>{ this.doSearch(); },\n      retryOne:(name)=>{ this.retryOne(name); },\n      searchCard:this.state.searchCard,\n      searchMsg:this.state.searchMsg,\n      searchMsgColor:this.state.searchErr?'#ff8090':'rgba(255,255,255,0.6)',\n      scrollWerk:()=>this.scrollTo('werk'),\n      scrollSymp:()=>this.scrollTo('symp'),\n      scrollInterv:()=>this.scrollTo('interv'),\n      stations, panel, forecast, fcTitle, atmOpacity\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
